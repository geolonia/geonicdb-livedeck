name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# gh-pages ブランチへ publish するためソースへの書き込み権限のみ。
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Vite ビルド。BASE_URL は Pages のサブパス、API キーはリポジトリ
      # シークレットを VITE_* 環境変数として注入する（バンドルへ埋め込み）。
      - run: npm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/
          VITE_GEONICDB_READONLY_KEY: ${{ secrets.GEONICDB_READONLY_KEY }}
          VITE_GEONICDB_SURVEY_KEY: ${{ secrets.GEONICDB_SURVEY_KEY }}
          VITE_GEOLONIA_API_KEY: ${{ secrets.VITE_GEOLONIA_API_KEY }}
      # ビルド成果物（dist/）だけを gh-pages ブランチへ公開（.nojekyll 自動付与）。
      # ソース側（main）にはビルド出力を残さない。
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
