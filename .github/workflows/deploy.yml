name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Vite ビルド。BASE_URL は GitHub Pages のサブパス、API キーはリポジトリ
      # シークレットを VITE_* 環境変数として注入する（バンドルへ埋め込み）。
      - run: npm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/
          VITE_GEONICDB_READONLY_KEY: ${{ secrets.GEONICDB_READONLY_KEY }}
          VITE_GEONICDB_SURVEY_KEY: ${{ secrets.GEONICDB_SURVEY_KEY }}
          VITE_GEOLONIA_API_KEY: ${{ secrets.VITE_GEOLONIA_API_KEY }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
