<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630"
     font-family="'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif">
  <defs>
    <radialGradient id="bg" cx="20%" cy="10%" r="120%">
      <stop offset="0" stop-color="#2b2b36"/><stop offset="0.6" stop-color="#17171d"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="#fc6c00"/>

  <!-- horizontal logo lockup -->
  <image x="80" y="92" width="360" height="48.6" xlink:href="geonic-logo-h-dark.svg"/>

  <!-- headline -->
  <text x="80" y="262" font-size="62" font-weight="800" fill="#ffffff">FIWARE Orion 互換の</text>
  <text x="80" y="344" font-size="62" font-weight="800" fill="#fc6c00">フルマネージド</text>
  <text x="80" y="426" font-size="62" font-weight="800" fill="#ffffff">Context Broker サービス</text>

  <!-- subtitle -->
  <text x="82" y="486" font-size="24" fill="#b9c2cf">NGSIv2 ＋ NGSI-LD デュアルプロトコル ／ AI・地理空間ネイティブ ／ 運用レス</text>

  <!-- footer -->
  <text x="82" y="566" font-size="20" fill="#7c8696" font-family="'JetBrains Mono',monospace">Geolonia, Inc.  ·  GeonicDB Context Broker</text>
</svg>
